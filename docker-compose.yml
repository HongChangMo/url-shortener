services:
  shortener:
    build:
      context: .
      dockerfile: shortener/Dockerfile
    ports: ["8080:8080"]
    environment:
      - DB_HOST=postgres
      - DB_PASSWORD=postgres
      - VALKEY_HOST=valkey
    depends_on: [postgres, valkey]
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/v1/nonexistent | grep -q 404"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=urlshortener
      - POSTGRES_PASSWORD=postgres
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  valkey:
    image: valkey/valkey:8
    ports: ["6379:6379"]

  api-server:
    image: kennethreitz/httpbin
    ports: ["9090:80"]

  k6-smoke:
    image: grafana/k6:latest
    profiles: [smoke]
    volumes: ["./k6/scripts:/scripts"]
    command: run /scripts/smoke.js
    environment:
      - BASE_URL=http://shortener:8080
      - API_SERVER=http://api-server:80
    depends_on:
      shortener:
        condition: service_healthy
      api-server:
        condition: service_started

  k6-load:
    image: grafana/k6:latest
    profiles: [load]
    volumes: ["./k6/scripts:/scripts"]
    command: run /scripts/load.js
    environment:
      - BASE_URL=http://shortener:8080
      - API_SERVER=http://api-server:80
    depends_on:
      shortener:
        condition: service_healthy
      api-server:
        condition: service_started

  k6-stress:
    image: grafana/k6:latest
    profiles: [stress]
    volumes: ["./k6/scripts:/scripts"]
    command: run /scripts/stress.js
    environment:
      - BASE_URL=http://shortener:8080
      - API_SERVER=http://api-server:80
    depends_on:
      shortener:
        condition: service_healthy
      api-server:
        condition: service_started

volumes:
  pgdata:
